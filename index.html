<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="description" content="Echodome — official band app" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>ECHODOME</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- Fontes base (fallback antes do CharDesign carregar as fontes por personagem) -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/themes.css" />
  <link rel="stylesheet" href="css/player.css" />
  <!-- Sistema de design por personagem -->
  <link rel="stylesheet" href="css/character-design.css" />
  <link rel="stylesheet" href="css/char-bg.css" />
  <!-- Mobile overrides (≤ 600px) — centralizado aqui -->
  <link rel="stylesheet" href="css/mobile.css" />
  <!-- Visualizer -->
  <link rel="stylesheet" href="css/visualizer.css" />
  <!-- Download UI -->
  <link rel="stylesheet" href="css/downloader.css" />
  <!-- Gallery lightbox -->
  <link rel="stylesheet" href="css/gallery.css" />
  <!-- Character viewer -->
  <link rel="stylesheet" href="css/char-viewer.css" />
</head>
<body data-theme="trace">

  <!-- NAV -->
  <header class="site-header">
    <div class="logo-wrap">
      <span class="logo-text">ECHODOME</span>
    </div>
    <nav class="main-nav">
      <button class="nav-btn active" data-section="home">HOME</button>
      <button class="nav-btn" data-section="music">MUSIC</button>
      <button class="nav-btn" data-section="gallery">GALLERY</button>
      <button class="nav-btn" data-section="about">BAND</button>
    </nav>
    <span class="offline-badge" id="offlineBadge">OFFLINE</span>
    <button class="char-view-btn" id="charViewBtn" aria-label="Ver personagem">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2C9 2 6 5 6 9c0 3 1.5 5.5 4 7l2 1.5L14 16c2.5-1.5 4-4 4-7 0-4-3-7-6-7z"/>
        <circle cx="12" cy="9" r="2.5"/>
        <path d="M6 22c0-3 2.7-5 6-5s6 2 6 5"/>
      </svg>
    </button>
    <button class="theme-toggle-btn" id="themeToggleBtn" aria-label="Selecionar tema">
      <span class="theme-dot"></span>
      <span class="theme-label">TRACE</span>
    </button>
  </header>

  <!-- THEME SELECTOR PANEL -->
  <aside class="theme-panel" id="themePanel">
    <p class="theme-panel-title">SELECT YOUR SIGNAL</p>
    <div class="theme-members">
      <button class="member-card" data-theme="trace">
        <div class="member-neon-ring"></div>
        <div class="member-icon">◈</div>
        <span class="member-name">TRACE</span>
        <span class="member-role">VOX / GTR</span>
      </button>
      <button class="member-card" data-theme="od">
        <div class="member-neon-ring"></div>
        <div class="member-icon">◆</div>
        <span class="member-name">OD</span>
        <span class="member-role">GUITAR</span>
      </button>
      <button class="member-card" data-theme="dusk">
        <div class="member-neon-ring"></div>
        <div class="member-icon">✶</div>
        <span class="member-name">DUSK</span>
        <span class="member-role">BASS</span>
      </button>
      <button class="member-card" data-theme="ember">
        <div class="member-neon-ring"></div>
        <div class="member-icon">★</div>
        <span class="member-name">EMBER</span>
        <span class="member-role">DRUMS</span>
      </button>
      <button class="member-card" data-theme="lyra">
        <div class="member-neon-ring"></div>
        <div class="member-icon">⟁</div>
        <span class="member-name">LYRA</span>
        <span class="member-role">KEYS</span>
      </button>
    </div>
  </aside>
  <div class="theme-panel-overlay" id="themePanelOverlay"></div>

  <!-- CHARACTER BACKGROUND (fixed, atrás de tudo) -->
  <div class="char-bg" id="charBg"></div>

  <!-- MAIN CONTENT -->
  <main class="main-content">

    <!-- HOME SECTION -->
    <section class="section active" id="section-home">
      <div class="hero">
        <div class="hero-geo-bg"><div class="geo-lines"></div></div>
        <div class="hero-content">
          <p class="hero-eyebrow">// SIGNAL RECEIVED</p>
          <h1 class="hero-title">ECHODOME</h1>
          <p class="hero-sub">THE SOUND INSIDE THE MASK</p>
          <div class="hero-actions">
            <button class="btn-primary" data-nav="music">LISTEN NOW</button>
            <button class="btn-ghost" data-nav="about">MEET THE BAND</button>
          </div>
        </div>
        
      </div>
    </section>

    <!-- MUSIC SECTION -->
    <section class="section" id="section-music">
      <div class="section-header section-header--has-progress">
        <h2 class="section-title">MUSIC</h2>
        <div class="section-line"></div>
        <div class="section-search-wrap">
          <input
            class="section-search"
            id="musicSearch"
            type="search"
            placeholder="SEARCH TRACKS…"
            aria-label="Buscar faixa"
            autocomplete="off"
            spellcheck="false"
          />
        </div>
        <button class="dl-all-pill" id="dlAllPill" aria-label="Download all tracks">
          <span class="dl-all-pill__icon" id="dlAllPillIcon" data-icon="download"></span>
          <span class="dl-all-pill__label" id="dlAllPillLabel">OFFLINE</span>
          <span class="dl-all-pill__count" id="dlAllPillCount"></span>
        </button>
      </div>
      <div class="dl-all-pill__progress" id="dlAllProgress">
        <div class="download-all-progress-fill" id="dlAllFill" style="width:0%"></div>
      </div>
      <div class="tracklist" id="tracklist"></div>
    </section>

    <!-- GALLERY SECTION -->
    <section class="section" id="section-gallery">
      <div class="section-header">
        <h2 class="section-title">GALLERY</h2>
        <div class="section-line"></div>
        <div class="section-search-wrap">
          <input
            class="section-search"
            id="gallerySearch"
            type="search"
            placeholder="SEARCH GALLERY…"
            aria-label="Buscar na galeria"
            autocomplete="off"
            spellcheck="false"
          />
        </div>
      </div>
      <div class="gallery-grid" id="galleryGrid"></div>
    </section>

    <!-- BAND SECTION -->
    <section class="section" id="section-about">
      <div class="section-header">
        <h2 class="section-title">THE BAND</h2>
        <div class="section-line"></div>
      </div>
      <div class="band-grid" id="bandGrid"></div>
    </section>

  </main>

  <!-- MINI PLAYER -->
  <div class="mini-player hidden" id="miniPlayer">
    <div class="mini-progress-bar" id="miniProgressBar">
      <canvas id="vizCanvasMini" class="viz-canvas-mini"></canvas>
      <div class="mini-progress-fill" id="miniProgressFill"></div>
    </div>
    <div class="mini-player__body">
      <div class="mini-player__cover" id="expandPlayer" aria-label="Abrir player fullscreen">
        <img id="miniCoverImg" src="" alt="" onerror="this.style.display='none';document.getElementById('miniCoverFallback').style.display='flex'">
        <span id="miniCoverFallback" class="mini-cover-fallback" data-icon="music"></span>
        <span class="mini-expand-icon" data-icon="expand"></span>
      </div>
      <div class="mini-player__info">
        <span class="mini-player__title" id="miniTitle">—</span>
        <span class="mini-player__artist">ECHODOME</span>
      </div>
      <div class="mini-player__controls">
        <button class="ctrl-btn" id="miniPrev" aria-label="Anterior" data-icon="prev"></button>
        <button class="ctrl-btn ctrl-btn--play" id="miniPlay" aria-label="Play/Pause" data-icon="play"></button>
        <button class="ctrl-btn" id="miniNext" aria-label="Próximo" data-icon="next"></button>
      </div>
    </div>
  </div>

  <!-- FULLSCREEN PLAYER (MODO IMERSIVO) -->
  <div class="fullscreen-player" id="fullscreenPlayer" aria-hidden="true">

    <!-- Botão fechar -->
    <button class="fs-close-btn" id="fsCloseBtn" aria-label="Fechar" data-icon="close"></button>

    <!-- Botões de modo: Loop / Focus / Boost / Band -->
    <div class="fs-mode-btns">
      <button class="fs-mode-btn" id="fsShuffleBtn"   aria-label="Shuffle"     data-icon="shuffle" data-tooltip="SHUFFLE"></button>
      <button class="fs-mode-btn" id="fsLoopBtn"      aria-label="Loop"        data-icon="loop"    data-tooltip="LOOP"></button>
      <button class="fs-mode-btn" id="fsFocusModeBtn" aria-label="Focus mode"  data-icon="focus"   data-tooltip="FOCUS — oculta a UI"></button>
      <button class="fs-mode-btn" id="fsBoostBtn"     aria-label="Boost"       data-icon="boost"   data-tooltip="BOOST — amplifica o visualizador"></button>
      <button class="fs-mode-btn" id="fsBandModeBtn"  aria-label="Band mode"   data-icon="band"    data-tooltip="BAND MODE — equalizers por instrumento"></button>
    </div>

    <!-- Fundo dinâmico: capa desfocada + overlay gradiente -->
    <div class="fs-dynamic-bg">
      <div class="fs-bg-cover" id="fsBgCover"></div>
      <div class="fs-bg-overlay"></div>
    </div>


    <canvas id="vizCanvasParticles" class="viz-canvas-particles"></canvas>

    <!-- Silhueta do personagem (lado direito, sutil) -->
    <div class="fs-char-silhouette">
      <span class="fs-char-icon" id="fsCharIcon">◈</span>
      <span class="fs-char-name" id="fsCharName">TRACE</span>
      <span class="fs-char-role" id="fsCharRole">VOX / GTR</span>
    </div>

    <!-- Conteúdo central -->
    <div class="fs-content">

      <!-- CAPA GRANDE com glow pulsante e anel girando -->
      <div class="fs-cover-wrap">
        <div class="fs-cover-glow" id="fsCoverGlow"></div>
        <div class="fs-cover-ring" id="fsCoverRing"></div>
        <div class="fs-cover-img-wrap">
          <img class="fs-cover-img" id="fsCoverImg" src="" alt=""
               onerror="this.style.display='none';document.getElementById('fsCoverFallback').style.display='flex'">
          <span class="fs-cover-fallback" id="fsCoverFallback" style="display:none">◈</span>
        </div>
      </div>

      <!-- Título + artista -->
      <div class="fs-meta">
        <h2 class="fs-title" id="fsTitle">—</h2>
        <p class="fs-artist">ECHODOME</p>
      </div>

      <!-- Waveform reagindo ao som -->
      <div class="fs-waveform-wrap">
        <canvas id="vizCanvasFS" class="viz-canvas-fs"></canvas>
      </div>

      <!-- Tempo -->
      <div class="fs-time">
        <span id="fsCurrent">0:00</span>
        <span id="fsDuration">0:00</span>
      </div>

      <!-- Barra de progresso estilo energia -->
      <div class="fs-progress-wrap">
        <div class="fs-progress-bar" id="fsProgressBar"
             role="slider" aria-label="Progresso da música"
             aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"
             tabindex="0">
          <div class="fs-progress-fill" id="fsProgressFill"></div>
          <div class="fs-progress-head" id="fsProgressHead"></div>
        </div>
      </div>

      <!-- Controles principais -->
      <div class="fs-controls">
        <button class="fs-ctrl-btn" id="fsPrev" data-icon="prev"></button>
        <button class="fs-ctrl-btn fs-ctrl-btn--play" id="fsPlay" data-icon="play"></button>
        <button class="fs-ctrl-btn" id="fsNext" data-icon="next"></button>
      </div>

      <!-- Volume -->
      <div class="fs-volume-wrap">
        <span class="vol-icon" data-icon="volume"></span>
        <input type="range" class="fs-volume-slider" id="fsVolume" min="0" max="1" step="0.01" value="1" />
      </div>

      <!-- Band Mode: equalizadores por instrumento -->
      <div class="fs-band-mode" id="fsBandModePanel">
        <div class="band-channel">
          <canvas class="band-eq-canvas" id="eqBass"></canvas>
          <span class="band-channel-label">BASS</span>
        </div>
        <div class="band-channel">
          <canvas class="band-eq-canvas" id="eqGuitar"></canvas>
          <span class="band-channel-label">GTR</span>
        </div>
        <div class="band-channel">
          <canvas class="band-eq-canvas" id="eqKeys"></canvas>
          <span class="band-channel-label">KEYS</span>
        </div>
        <div class="band-channel">
          <canvas class="band-eq-canvas" id="eqDrums"></canvas>
          <span class="band-channel-label">DRUMS</span>
        </div>
      </div>

      <!-- Tabs: Lyrics / Story -->
      <div class="fs-tabs">
        <button class="fs-tab active" data-tab="lyrics">LYRICS</button>
        <button class="fs-tab" data-tab="story">STORY</button>
      </div>
      <div class="fs-tab-content">
        <div class="fs-tab-pane active" id="tab-lyrics">
          <div class="fs-lyrics" id="fsLyrics"><p class="placeholder-text">// no lyrics loaded</p></div>
        </div>
        <div class="fs-tab-pane" id="tab-story">
          <div class="fs-story" id="fsStory"><p class="placeholder-text">// no story loaded</p></div>
        </div>
      </div>

    </div><!-- /fs-content -->
  </div><!-- /fullscreen-player -->

  <audio id="audioEngine" preload="metadata"></audio>

  <script src="js/icons.js"></script>
  <script src="js/songs/index.js"></script>
  <script src="js/downloader.js"></script>
  <script src="js/themes.js"></script>
  <script src="js/character-design.js"></script>
  <!-- VISUALIZER -->
  <script src="js/visualizer.js"></script>
  <script src="js/player.js"></script>
  <script src="js/char-bg.js"></script>
  <script src="js/gallery.js"></script>
  <script src="js/char-viewer.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
